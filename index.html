<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Datos Personales</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ebe6eb;
            color: #050505;
            padding: 20px;
        }

        form {
            background-color: #c512ad;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            margin: auto;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #dddbdd;
            border-radius: 4px;
        }

        .botones {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <form>
        <h2>Datos personales</h2>
        <label> Nombre:
            <input type="text" name="nombre">
        </label>
        <label> Apellido:
            <input type="text" name="apellido">
        </label>
        <label> Email:
            <input type="email" name="email">
        </label>
        <label>Fecha de nacimiento:
            <input type="date" name="fecha">
        </label>
        <label> País de residencia:
            <select name="pais">
                <option value=""> seleccione...</option>
                <option>Argentina</option>
                <option>Brasil</option>
                <option>Chile</option>
                <option>Colombia</option>
                <option>Perú</option>
                <option>España</option>
            </select>
        </label>
        <div class="botones">
            <button type="submit">Enviar</button>
            <button type="button">Estilo normal</button>
            <button type="button">Estilo alto contraste</button>
        </div>
    </form>
</body>

</html>
